<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Greeting</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              arabic: ["Tajawal", "sans-serif"],
              ui: ["Inter", "sans-serif"],
            },
            boxShadow: {
              glow: "0 0 20px rgba(99,102,241,0.55), 0 0 40px rgba(251,191,36,0.28)",
            },
            keyframes: {
              floaty: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-14px)" },
              },
              pulseSoft: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.9" },
                "50%": { transform: "scale(1.05)", opacity: "1" },
              },
            },
            animation: {
              floaty: "floaty 3.5s ease-in-out infinite",
              pulseSoft: "pulseSoft 2.4s ease-in-out infinite",
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at 20% 10%, #312e81 0%, #0f172a 45%, #020617 100%);
      }
      .bokeh {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .bokeh span {
        position: absolute;
        display: block;
        border-radius: 999px;
        opacity: 0.25;
        animation: drift linear infinite;
        filter: blur(0.5px);
      }
      @keyframes drift {
        from {
          transform: translateY(110vh) scale(0.8);
        }
        to {
          transform: translateY(-20vh) scale(1.15);
        }
      }
    </style>
  </head>
  <body class="font-ui text-slate-100">
    <div class="bokeh" id="bokeh"></div>

    <main class="relative z-10 flex min-h-screen items-center justify-center p-6">
      <section class="w-full max-w-2xl text-center">
        <button
          id="openBtn"
          class="group mx-auto flex w-full max-w-sm flex-col items-center rounded-3xl border border-indigo-400/40 bg-slate-900/65 p-8 shadow-glow backdrop-blur transition duration-500 hover:scale-[1.02] hover:border-amber-300/60 focus:outline-none focus:ring-2 focus:ring-amber-300/60 animate-pulseSoft"
          aria-label="Open birthday message"
        >
          <div class="relative mb-5 h-24 w-24 animate-floaty">
            <div class="absolute inset-0 rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 shadow-[0_0_25px_rgba(99,102,241,0.55)]"></div>
            <div class="absolute left-1/2 top-0 h-full w-3 -translate-x-1/2 bg-amber-300/95"></div>
            <div class="absolute top-1/2 left-0 h-3 w-full -translate-y-1/2 bg-amber-300/95"></div>
          </div>
          <p class="text-lg font-semibold text-amber-200">You have a special message! Click to open</p>
        </button>

        <article
          id="contentCard"
          class="pointer-events-none mt-8 scale-95 rounded-3xl border border-indigo-300/30 bg-slate-900/70 p-6 opacity-0 shadow-glow backdrop-blur-md transition-all duration-1000 sm:p-8"
        >
          <div class="mx-auto h-44 w-44 rounded-full bg-gradient-to-tr from-fuchsia-500 via-indigo-500 to-amber-300 p-1.5 shadow-glow sm:h-52 sm:w-52">
            <img
              id="profileImage"
              src="https://github.com/user-attachments/assets/1ffcdcc6-c816-4cbb-b395-4078bab15c45"
              alt="Birthday profile"
              class="h-full w-full rounded-full object-cover"
            />
          </div>

          <h1 class="mt-6 font-arabic text-3xl font-bold leading-relaxed text-slate-100 sm:text-4xl" dir="rtl">
            كل سنة وأنت طيب يا صاحبي، وعيد ميلاد سعيد عليك وإن شاء الله تكون سنة خير ونجاح ليك
          </h1>
          <p class="mt-4 text-sm text-slate-300">عيد ميلاد سعيد 🎉</p>
        </article>
      </section>
    </main>

    <!-- Replace this URL with any preferred birthday track -->
    <audio
      id="birthdayAudio"
      preload="auto"
      loop
      src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f4f0f6dc.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3"
    ></audio>

    <script>
      const openBtn = document.getElementById("openBtn");
      const contentCard = document.getElementById("contentCard");
      const birthdayAudio = document.getElementById("birthdayAudio");
      const bokeh = document.getElementById("bokeh");

      function createBokeh() {
        const colors = [
          "rgba(99,102,241,0.6)",
          "rgba(236,72,153,0.5)",
          "rgba(245,158,11,0.55)",
          "rgba(148,163,184,0.4)",
        ];
        for (let i = 0; i < 24; i++) {
          const dot = document.createElement("span");
          const size = Math.random() * 18 + 8;
          dot.style.width = `${size}px`;
          dot.style.height = `${size}px`;
          dot.style.left = `${Math.random() * 100}%`;
          dot.style.animationDuration = `${Math.random() * 18 + 14}s`;
          dot.style.animationDelay = `${Math.random() * -22}s`;
          dot.style.background = colors[Math.floor(Math.random() * colors.length)];
          bokeh.appendChild(dot);
        }
      }

      function launchConfetti() {
        confetti({ particleCount: 120, spread: 85, origin: { y: 0.62 } });
        setTimeout(() => confetti({ particleCount: 80, spread: 70, origin: { x: 0.2, y: 0.5 } }), 150);
        setTimeout(() => confetti({ particleCount: 80, spread: 70, origin: { x: 0.8, y: 0.5 } }), 220);
      }

      async function playMusic() {
        try {
          birthdayAudio.currentTime = 0;
          await birthdayAudio.play();
        } catch (_) {
          // Browser autoplay rules may block playback without user gesture
        }
      }

      openBtn.addEventListener("click", async () => {
        openBtn.classList.add("opacity-0", "scale-95", "pointer-events-none");
        setTimeout(() => openBtn.classList.add("hidden"), 450);

        contentCard.classList.remove("opacity-0", "scale-95", "pointer-events-none");
        contentCard.classList.add("opacity-100", "scale-100");

        launchConfetti();
        await playMusic();
      });

      createBokeh();
    </script>
  </body>
</html>
